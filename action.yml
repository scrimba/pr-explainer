name: Scrimba PR Explainer
description: Create Scrimba explainers for pull requests with Claude Code, Codex, or both.

inputs:
  agents:
    description: Comma-separated agents to run, e.g. claude,codex. Empty picks an agent from the credentials provided via env.
    required: false
    default: ""
  pr-number:
    description: PR number to explain. Empty resolves the PR from the triggering event.
    required: false
    default: ""
  allow-forks:
    description: Set to true to allow PR explainers on fork PRs.
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Resolve checkout ref
      id: checkout-ref
      shell: bash
      env:
        SCRIMBA_PR_EXPLAINER_EVENT_PR_NUMBER: ${{ github.event.pull_request.number || '' }}
        SCRIMBA_PR_EXPLAINER_PR_NUMBER: ${{ inputs.pr-number }}
      run: |
        set -euo pipefail
        if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
          echo "ref=refs/pull/$SCRIMBA_PR_EXPLAINER_EVENT_PR_NUMBER/merge" >> "$GITHUB_OUTPUT"
        elif [ -n "$SCRIMBA_PR_EXPLAINER_PR_NUMBER" ]; then
          echo "ref=refs/pull/$SCRIMBA_PR_EXPLAINER_PR_NUMBER/merge" >> "$GITHUB_OUTPUT"
        else
          echo "ref=$GITHUB_REF" >> "$GITHUB_OUTPUT"
        fi

    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
        persist-credentials: false
        ref: ${{ steps.checkout-ref.outputs.ref }}

    - name: Run Scrimba PR Explainer
      shell: bash
      env:
        SCRIMBA_PR_EXPLAINER_AGENTS: ${{ inputs.agents }}
        SCRIMBA_PR_EXPLAINER_PR_NUMBER: ${{ inputs.pr-number }}
        SCRIMBA_PR_EXPLAINER_ALLOW_FORKS: ${{ inputs.allow-forks }}
      run: "$GITHUB_ACTION_PATH/scripts/run-action.sh"
